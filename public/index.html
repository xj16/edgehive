<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EdgeHive · realtime demo</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font: 15px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        background: #0b0e14;
        color: #cdd6f4;
        padding: 2rem 1rem;
      }
      main { max-width: 760px; margin: 0 auto; }
      h1 { font-size: 1.4rem; margin: 0 0 .25rem; color: #f5c542; }
      p.sub { margin: 0 0 1.5rem; color: #7f849c; }
      .row { display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: 1rem; }
      input, button {
        font: inherit;
        padding: .5rem .75rem;
        border-radius: 6px;
        border: 1px solid #313244;
        background: #181825;
        color: #cdd6f4;
      }
      input { flex: 1; min-width: 140px; }
      button { cursor: pointer; background: #f5c542; color: #11111b; border: none; font-weight: 600; }
      button.ghost { background: #181825; color: #cdd6f4; border: 1px solid #313244; }
      #log {
        background: #11111b;
        border: 1px solid #313244;
        border-radius: 8px;
        padding: 1rem;
        min-height: 240px;
        max-height: 50vh;
        overflow: auto;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .ev { margin-bottom: .5rem; }
      .ev .tag {
        display: inline-block;
        padding: 0 .4rem;
        border-radius: 4px;
        font-size: .8rem;
        margin-right: .5rem;
      }
      .created { background: #40a02b33; color: #a6e3a1; }
      .updated { background: #df8e1d33; color: #f9e2af; }
      .deleted { background: #d20f3933; color: #f38ba8; }
      .ready, .heartbeat { background: #1e66f533; color: #89b4fa; }
      .status { font-size: .85rem; color: #7f849c; margin-left: auto; }
    </style>
  </head>
  <body>
    <main>
      <h1>EdgeHive</h1>
      <p class="sub">Realtime API demo — same server runs on Bun, Deno &amp; Node.</p>

      <div class="row">
        <input id="base" value="http://localhost:8787" aria-label="Base URL" />
        <input id="collection" value="messages" aria-label="Collection" />
        <span class="status" id="conn">disconnected</span>
      </div>

      <div class="row">
        <input id="text" placeholder="type a message and hit Send…" aria-label="Message text" />
        <button id="send">Send</button>
        <button id="clear" class="ghost">Clear log</button>
      </div>

      <div id="log" aria-live="polite"></div>
    </main>

    <script>
      const $ = (id) => document.getElementById(id);
      const log = $("log");
      let token = null;
      let es = null;

      function line(kind, msg) {
        const div = document.createElement("div");
        div.className = "ev";
        div.innerHTML = `<span class="tag ${kind}">${kind}</span>${msg}`;
        log.prepend(div);
      }

      async function ensureToken(base) {
        if (token) return token;
        const res = await fetch(base + "/auth/login", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ email: "browser@edgehive.dev" }),
        });
        token = (await res.json()).token;
        line("ready", "authenticated as browser@edgehive.dev");
        return token;
      }

      function connect() {
        if (es) es.close();
        const base = $("base").value.replace(/\/$/, "");
        const col = $("collection").value.trim() || "messages";
        es = new EventSource(`${base}/v1/${col}/stream`);
        $("conn").textContent = "connecting…";

        es.addEventListener("ready", () => { $("conn").textContent = "live"; line("ready", "stream open for " + col); });
        es.addEventListener("heartbeat", () => { $("conn").textContent = "live"; });
        for (const type of ["created", "updated", "deleted"]) {
          es.addEventListener(type, (e) => {
            const data = JSON.parse(e.data);
            line(type, `${data.id} ${data.data ? JSON.stringify(data.data) : ""}`);
          });
        }
        es.onerror = () => { $("conn").textContent = "reconnecting…"; };
      }

      $("send").addEventListener("click", async () => {
        const base = $("base").value.replace(/\/$/, "");
        const col = $("collection").value.trim() || "messages";
        const text = $("text").value.trim();
        if (!text) return;
        await ensureToken(base);
        await fetch(`${base}/v1/${col}`, {
          method: "POST",
          headers: { "content-type": "application/json", authorization: "Bearer " + token },
          body: JSON.stringify({ text, at: Date.now() }),
        });
        $("text").value = "";
      });

      $("text").addEventListener("keydown", (e) => { if (e.key === "Enter") $("send").click(); });
      $("clear").addEventListener("click", () => (log.innerHTML = ""));
      $("base").addEventListener("change", connect);
      $("collection").addEventListener("change", connect);

      connect();
    </script>
  </body>
</html>
