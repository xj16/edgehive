name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Type-check + tests on Node.js. Node is the canonical toolchain and is the
  # only runtime where we run the full TypeScript type-check. We target Node 22
  # and 24 because native TypeScript execution (`--experimental-strip-types`)
  # requires Node >= 22.6; Node 20 cannot run the `.ts` sources directly.
  # ---------------------------------------------------------------------------
  node:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['22', '24']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - name: Type-check
        run: npm run typecheck
      - name: Unit + parity tests
        run: npm test
      - name: Runtime smoke test (Node)
        run: node --experimental-strip-types scripts/smoke.ts
      - name: Realtime fan-out load test (scaled for CI)
        run: SUBSCRIBERS=100 EVENTS=25 P95_BUDGET_MS=250 node --experimental-strip-types scripts/load.ts

  # ---------------------------------------------------------------------------
  # Coverage: run the suite with Node's built-in coverage, print the summary,
  # and (on push to main) regenerate + commit the shields.io coverage badge.
  # ---------------------------------------------------------------------------
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Coverage report
        run: npm run coverage
      - name: Regenerate coverage badge
        run: npm run coverage:badge
      - name: Commit badge if it changed (main only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          if ! git diff --quiet -- .github/badges/coverage.json; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .github/badges/coverage.json
            git commit -m "ci: update coverage badge [skip ci]"
            git push
          else
            echo "Coverage badge unchanged."
          fi

  # ---------------------------------------------------------------------------
  # Run the exact same parity suite on Deno to prove runtime parity.
  # ---------------------------------------------------------------------------
  deno:
    name: Deno
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Deno tests (parity suite)
        run: deno test --allow-net --allow-env --allow-read --no-check test/
      - name: Runtime smoke test (Deno)
        run: deno run --allow-net --allow-env --allow-read scripts/smoke.ts

  # ---------------------------------------------------------------------------
  # Run the parity suite on Bun as well.
  # ---------------------------------------------------------------------------
  bun:
    name: Bun
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Runtime smoke test (Bun)
        run: bun run scripts/smoke.ts

  # ---------------------------------------------------------------------------
  # Boot the app against a REAL Firebase Firestore + Auth emulator and drive it
  # over HTTP, proving the Firestore-backed store works end to end.
  # ---------------------------------------------------------------------------
  emulator:
    name: Firebase emulator (integration)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Set up JDK (required by the Firestore emulator)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - run: npm ci
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
      - name: Run integration test against the emulator
        env:
          EDGEHIVE_USE_EMULATOR: 'true'
          FIRESTORE_EMULATOR_HOST: '127.0.0.1:8080'
          FIREBASE_AUTH_EMULATOR_HOST: '127.0.0.1:9099'
          GCLOUD_PROJECT: edgehive-demo
          PORT: '8787'
        run: |
          firebase emulators:exec \
            --only firestore,auth \
            --project edgehive-demo \
            "node --experimental-strip-types scripts/integration.ts"
