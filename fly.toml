# Fly.io deployment for the hosted EdgeHive playground.
#
#   fly launch --no-deploy      # create the app (once)
#   fly secrets set EDGEHIVE_AUTH_SECRET=$(openssl rand -hex 32)
#   fly deploy
#
# This runs EdgeHive in demo mode with the in-memory store (no external
# Firestore required), so a single `fly deploy` gives a live, pre-seeded,
# shareable instance. Point EDGEHIVE_USE_EMULATOR + FIRESTORE_EMULATOR_HOST at a
# managed Firestore/proxy to switch to durable storage.

app = "edgehive"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8787"
  EDGEHIVE_USE_EMULATOR = "false"
  EDGEHIVE_DEMO = "1"
  # Lock CORS to your portfolio origin in production, e.g.:
  # EDGEHIVE_CORS_ORIGINS = "https://your-portfolio.example"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    method = "GET"
    path = "/health"
    interval = "15s"
    timeout = "2s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
